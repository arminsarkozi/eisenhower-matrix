<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eisenhower Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Fill viewport and prevent body scroll */
        html, body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 1.5rem;
        }

        /* Matrix wrapper with central axes */
        .matrix-container {
            position: relative;
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 3.5rem; /* Increased gap to comfortably fit labels without overlap */
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* Central Axes Logic */
        .central-axis-v, .central-axis-h {
            position: absolute;
            background: #cbd5e1;
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Vertical Axis (Importance) */
        .central-axis-v {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            transform: translateX(-50%);
        }

        /* Horizontal Axis (Urgency) */
        .central-axis-h {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }

        /* Axis Labels - Positioned inside the gap */
        .axis-label-box {
            position: absolute;
            background: #f8fafc; /* Match body bg for seamless look */
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #475569;
            white-space: nowrap;
            z-index: 20;
        }

        .label-importance {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            background: #f8fafc;
        }

        .label-urgency {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f8fafc;
        }

        .axis-arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }

        /* Direction Indicators (High/Low) - Positioned at axis ends */
        .direction-tag {
            position: absolute;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            background: #f8fafc;
            padding: 2px 5px;
        }

        /* Vertical direction positioning */
        .tag-v-high { top: -10px; left: 50%; transform: translateX(-50%); }
        .tag-v-low { bottom: -10px; left: 50%; transform: translateX(-50%); }

        /* Horizontal direction positioning */
        .tag-h-high { left: -10px; top: 50%; transform: translateY(-50%); }
        .tag-h-low { right: -10px; top: 50%; transform: translateY(-50%); }

        .quadrant {
            display: flex;
            flex-direction: column;
            min-height: 0;
            background-color: white;
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.2s ease;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .drag-over {
            border-style: dashed !important;
            border-color: #6366f1 !important;
            transform: scale(1.01);
            background-color: #f5f3ff !important;
        }

        /* Custom scrollbar */
        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-track { background: transparent; }
        .task-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Mobile specific: stack quadrants but hide central axes */
        @media (max-width: 767px) {
            .matrix-container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 1fr);
                gap: 1rem;
                overflow-y: auto;
            }
            .central-axis-v, .central-axis-h, .axis-label-box, .direction-tag {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="app-container">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-6 py-3 z-30 shadow-sm flex-shrink-0">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-black text-slate-900 tracking-tight flex items-center gap-2">
                        <i data-lucide="layout-dashboard" class="text-indigo-600 w-6 h-6"></i>
                        Eisenhower Matrix
                    </h1>
                    <div id="status-badge" class="text-[10px] text-indigo-600 font-bold bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100 uppercase tracking-wider">
                        Synced
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="exportData()" class="flex items-center gap-1 text-[10px] uppercase font-bold text-slate-500 hover:text-indigo-600 transition-colors">
                        <i data-lucide="download" class="w-3 h-3"></i> Backup
                    </button>
                    <span class="text-slate-300">|</span>
                    <button onclick="importData()" class="flex items-center gap-1 text-[10px] uppercase font-bold text-slate-500 hover:text-indigo-600 transition-colors">
                        <i data-lucide="upload" class="w-3 h-3"></i> Restore
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="matrix-container">
                
                <!-- Central Vertical Axis (Importance) -->
                <div class="central-axis-v">
                    <div class="axis-arrow" style="top: -10px; border-width: 0 6px 10px 6px; border-color: transparent transparent #cbd5e1 transparent;"></div>
                    <div class="axis-arrow" style="bottom: -10px; border-width: 10px 6px 0 6px; border-color: #cbd5e1 transparent transparent transparent;"></div>
                    
                    <div class="axis-label-box label-importance">Importance</div>
                    
                    <div class="direction-tag tag-v-high">High</div>
                    <div class="direction-tag tag-v-low">Low</div>
                </div>

                <!-- Central Horizontal Axis (Urgency) -->
                <div class="central-axis-h">
                    <div class="axis-arrow" style="left: -10px; border-width: 6px 10px 6px 0; border-color: transparent #cbd5e1 transparent transparent;"></div>
                    <div class="axis-arrow" style="right: -10px; border-width: 6px 0 6px 10px; border-color: transparent transparent transparent #cbd5e1;"></div>
                    
                    <div class="axis-label-box label-urgency">Urgency</div>
                    
                    <div class="direction-tag tag-h-high">High</div>
                    <div class="direction-tag tag-h-low">Low</div>
                </div>

                <!-- Q1: Do First (Urgent & Important) -->
                <div id="q1" class="quadrant rounded-2xl border-2 bg-emerald-50/50 border-emerald-200 overflow-hidden" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'q1')">
                    <div class="p-3 bg-emerald-100/50 border-b border-emerald-200">
                        <div class="flex items-center justify-between">
                            <h2 class="font-black text-sm tracking-tight uppercase text-emerald-900">Do First</h2>
                            <span id="count-q1" class="text-[10px] font-bold px-2 py-0.5 bg-white rounded-full text-emerald-700 shadow-sm border border-emerald-100">0</span>
                        </div>
                    </div>
                    <div class="task-list p-3"></div>
                    <form onsubmit="handleAddTask(event, 'q1')" class="p-3 pt-0 relative">
                        <input type="text" placeholder="Add urgent task..." class="w-full pl-3 pr-8 py-2 text-xs rounded-xl border border-emerald-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-all">
                        <button type="submit" class="absolute right-4.5 top-1/2 -translate-y-[calc(50%+6px)] p-1 text-emerald-800 hover:bg-emerald-100 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>

                <!-- Q2: Schedule (Not Urgent & Important) -->
                <div id="q2" class="quadrant rounded-2xl border-2 bg-cyan-50/50 border-cyan-200 overflow-hidden" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'q2')">
                    <div class="p-3 bg-cyan-100/50 border-b border-cyan-200">
                        <div class="flex items-center justify-between">
                            <h2 class="font-black text-sm tracking-tight uppercase text-cyan-900">Schedule</h2>
                            <span id="count-q2" class="text-[10px] font-bold px-2 py-0.5 bg-white rounded-full text-cyan-700 shadow-sm border border-cyan-100">0</span>
                        </div>
                    </div>
                    <div class="task-list p-3"></div>
                    <form onsubmit="handleAddTask(event, 'q2')" class="p-3 pt-0 relative">
                        <input type="text" placeholder="Schedule later..." class="w-full pl-3 pr-8 py-2 text-xs rounded-xl border border-cyan-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all">
                        <button type="submit" class="absolute right-4.5 top-1/2 -translate-y-[calc(50%+6px)] p-1 text-cyan-800 hover:bg-cyan-100 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>

                <!-- Q3: Delegate (Urgent & Not Important) -->
                <div id="q3" class="quadrant rounded-2xl border-2 bg-rose-50/50 border-rose-200 overflow-hidden" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'q3')">
                    <div class="p-3 bg-rose-100/50 border-b border-rose-200">
                        <div class="flex items-center justify-between">
                            <h2 class="font-black text-sm tracking-tight uppercase text-rose-900">Delegate</h2>
                            <span id="count-q3" class="text-[10px] font-bold px-2 py-0.5 bg-white rounded-full text-rose-700 shadow-sm border border-rose-100">0</span>
                        </div>
                    </div>
                    <div class="task-list p-3"></div>
                    <form onsubmit="handleAddTask(event, 'q3')" class="p-3 pt-0 relative">
                        <input type="text" placeholder="Delegate to..." class="w-full pl-3 pr-8 py-2 text-xs rounded-xl border border-rose-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-rose-400 transition-all">
                        <button type="submit" class="absolute right-4.5 top-1/2 -translate-y-[calc(50%+6px)] p-1 text-rose-800 hover:bg-rose-100 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>

                <!-- Q4: Delete (Not Urgent & Not Important) -->
                <div id="q4" class="quadrant rounded-2xl border-2 bg-slate-100/50 border-slate-300 overflow-hidden" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'q4')">
                    <div class="p-3 bg-slate-200/50 border-b border-slate-300">
                        <div class="flex items-center justify-between">
                            <h2 class="font-black text-sm tracking-tight uppercase text-slate-900">Eliminate</h2>
                            <span id="count-q4" class="text-[10px] font-bold px-2 py-0.5 bg-white rounded-full text-slate-700 shadow-sm border border-slate-200">0</span>
                        </div>
                    </div>
                    <div class="task-list p-3"></div>
                    <form onsubmit="handleAddTask(event, 'q4')" class="p-3 pt-0 relative">
                        <input type="text" placeholder="Drop this..." class="w-full pl-3 pr-8 py-2 text-xs rounded-xl border border-slate-300 bg-white/80 focus:outline-none focus:ring-2 focus:ring-slate-400 transition-all">
                        <button type="submit" class="absolute right-4.5 top-1/2 -translate-y-[calc(50%+6px)] p-1 text-slate-800 hover:bg-slate-200 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script>
        const STORAGE_KEY = 'eisenhower_matrix_center_axis_v2';
        let tasks = [];

        window.onload = () => {
            loadTasks();
            lucide.createIcons();
            renderTasks();
        };

        function loadTasks() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) tasks = JSON.parse(saved);
            } catch (e) { console.error(e); }
        }

        function saveTasks() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            } catch (e) { console.error(e); }
        }

        function renderTasks() {
            const grouped = { q1: [], q2: [], q3: [], q4: [] };
            tasks.forEach(t => grouped[t.quadrantId]?.push(t));

            Object.keys(grouped).forEach(qId => {
                const container = document.querySelector(`#${qId} .task-list`);
                const countBadge = document.getElementById(`count-${qId}`);
                countBadge.innerText = grouped[qId].length;
                
                if (grouped[qId].length === 0) {
                    container.innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-20 text-[10px]">
                        <i data-lucide="list" class="w-5 h-5 mb-1"></i>
                        <span>No Tasks</span>
                    </div>`;
                } else {
                    container.innerHTML = grouped[qId].map(task => `
                        <div draggable="true" ondragstart="handleDragStart(event, '${task.id}')"
                             class="group bg-white rounded-xl shadow-sm border border-slate-200 p-2.5 mb-2 flex items-center justify-between cursor-grab hover:shadow-md hover:border-indigo-200 transition-all">
                            <span class="text-slate-800 truncate text-[11px] font-semibold">${task.text}</span>
                            <button onclick="deleteTask('${task.id}')" class="text-slate-300 hover:text-rose-500 transition-colors p-1">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    `).join('');
                }
            });
            lucide.createIcons();
        }

        window.handleAddTask = (e, qId) => {
            e.preventDefault();
            const input = e.target.querySelector('input');
            if (!input.value.trim()) return;
            tasks.push({ id: Math.random().toString(36).substr(2, 9), text: input.value.trim(), quadrantId: qId, createdAt: Date.now() });
            saveTasks();
            input.value = '';
            renderTasks();
        };

        window.deleteTask = (id) => {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        };

        window.handleDragStart = (e, id) => e.dataTransfer.setData('text', id);
        window.handleDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
        window.handleDragLeave = (e) => e.currentTarget.classList.remove('drag-over');
        window.handleDrop = (e, qId) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const id = e.dataTransfer.getData('text');
            const task = tasks.find(t => t.id === id);
            if (task) { task.quadrantId = qId; saveTasks(); renderTasks(); }
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(tasks)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `matrix-backup.json`;
            a.click();
        };

        window.importData = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        tasks = JSON.parse(ev.target.result);
                        saveTasks();
                        renderTasks();
                    } catch(err) { alert("Invalid file"); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };
    </script>
</body>
</html>
